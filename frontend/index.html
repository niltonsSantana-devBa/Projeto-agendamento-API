<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaFácil | Clínica de Arquitetura</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-archway"></i>
                <span>AgendaFácil</span>
            </div>
            <ul class="nav-links">
                <li class="active" data-tab="dashboard">
                    <a href="#"><i class="fas fa-th-large"></i> Dashboard</a>
                </li>
                <li data-tab="clientes">
                    <a href="#"><i class="fas fa-users"></i> Clientes</a>
                </li>
                <li data-tab="profissionais">
                    <a href="#"><i class="fas fa-user-tie"></i> Profissionais</a>
                </li>
                <li data-tab="servicos">
                    <a href="#"><i class="fas fa-concierge-bell"></i> Serviços</a>
                </li>
                <li data-tab="agendamentos">
                    <a href="#"><i class="fas fa-calendar-alt"></i> Agendamentos</a>
                </li>
            </ul>
            <div class="sidebar-footer">
                <p>© 2024 Clínica de Arquitetura</p>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1 id="tab-title">Dashboard</h1>
                <div class="user-profile">
                    <span>Admin</span>
                    <div class="avatar"></div>
                </div>
            </header>

            <section class="content-area" id="content-area">
                <!-- Content will be injected here by JS -->
                <div class="welcome-card">
                    <h2>Bem-vindo ao Sistema de Agendamento</h2>
                    <p>Selecione uma categoria no menu ao lado para visualizar os dados em tempo real.</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-building"></i>
                        <div class="stat-info">
                            <h3>Status do Servidor</h3>
                            <p class="status online">Online</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
